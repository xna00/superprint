name: Build and Upload

on: [push, pull_request, workflow_dispatch]

env:
  NODE_VERSION: '24'

jobs:
  build-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build Server
        run: |
          cd server
          npm ci
          npm run buildtype

      - name: Build API
        run: |
          cd api
          npm ci
          npm run copy-types
          npm run build

      - name: Build Web
        run: |
          cd web
          npm ci
          npm run build

      - name: Build QuickWIN app
        run: |
          cd printdriver-quickwin
          npm ci --force
          npm run build

      - uses: actions/upload-artifact@v6
        with:
          name: all-build-artifacts
          path: |
            server/dist/
            api/__types__/
            api/index.js
            api/index.d.ts
            web/dist/
            printdriver-quickwin/dist/

  build-printdriver:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Cache innosetup
        id: cache-innosetup
        uses: actions/cache@v5
        with:
          path: C:\Program Files (x86)\Inno Setup 5
          key: ${{ runner.os }}-innosetup-5.6.1

      - name: Install Inno Setup
        if: steps.cache-innosetup.outputs.cache-hit != 'true'
        run: |
          choco install innosetup --version 5.6.1 -y --allow-downgrade

      - name: Cache CMake build
        id: cache-cmake
        uses: actions/cache@v5
        with:
          path: printdriver/build
          key: ${{ runner.os }}-cmake-build-${{ hashFiles('printdriver/src/**', 'printdriver/CMakeLists.txt', 'printdriver/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-cmake-build-

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v5
        with:
          path: |
            vcpkg
            printdriver/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-x64-windows-static-${{ hashFiles('printdriver/vcpkg.json') }}

      - name: Cache printdriver output
        id: cache-printdriver
        uses: actions/cache@v5
        with:
          path: printdriver/output
          key: ${{ runner.os }}-printdriver-output-${{ hashFiles('printdriver/src/**', 'printdriver/CMakeLists.txt', 'printdriver/vcpkg.json', 'printdriver/cert/**', 'printdriver/installer/**', 'printdriver/scripts/**') }}

      - name: Setup vcpkg
        if: steps.cache-printdriver.outputs.cache-hit != 'true' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: printdriver/vcpkg.json
          doNotCache: false
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows-static

      - name: Install vcpkg manifest deps (explicit)
        if: steps.cache-printdriver.outputs.cache-hit != 'true' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          & (Join-Path $env:VCPKG_ROOT 'vcpkg.exe') install --triplet x64-windows-static

      - name: Configure and Build CMake
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="../vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DVCPKG_MANIFEST_INSTALL=OFF -DVCPKG_INSTALLED_DIR="$PWD\vcpkg_installed"
          cmake --build build --config Release

      - name: Prepare output files
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          mkdir output -Force
          copy build\Release\PrintDriver.exe output\PrintDriver.exe
          copy build\Release\Setup.exe output\Setup.exe
          Write-Host "Copied exe files from CMake build"

      - name: Sign executables
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          $pfxPath = "printdriver\cert\PrintDriver.pfx"
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1
            
          Write-Host "Signing PrintDriver.exe..."
          & $signtool.FullName sign /f $pfxPath /p "PrintDriver2024" /fd sha256 "printdriver\output\PrintDriver.exe"
            
          Write-Host "Signing Setup.exe..."
          if (Test-Path "printdriver\output\Setup.exe") {
            & $signtool.FullName sign /f $pfxPath /p "PrintDriver2024" /fd sha256 "printdriver\output\Setup.exe"
          }

      - name: Generate version info
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          $versionLine = Select-String -Path "CMakeLists.txt" -Pattern 'VERSION\s+(\d+\.\d+\.\d+)' | Select-Object -First 1
          if ($versionLine) {
            $version = $versionLine.Matches.Groups[1].Value
            $json = @{
              version = $version
              exe = 'PrintDriver.exe'
              setupexe = 'Setup.exe'
            } | ConvertTo-Json -Depth 3
            [System.IO.File]::WriteAllText("$PWD\output\printdriver.json", $json, [System.Text.UTF8Encoding]::new($false))
            Write-Host "Generated printdriver.json with version $version"
          }

      - uses: actions/upload-artifact@v6
        with:
          name: printdriver-artifacts
          path: printdriver/output/

  assemble:
    needs: [build-all, build-printdriver]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: all-build-artifacts
          path: artifacts
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          name: printdriver-artifacts
          path: artifacts/printdriver
          merge-multiple: true

      - name: Prepare static files
        run: |
          mkdir -p static

          # Web dist
          if [ -d "artifacts/web/dist" ] && [ "$(ls -A artifacts/web/dist 2>/dev/null)" ]; then
            cp -r artifacts/web/dist/* static/
          fi

          # PrintDriver executables
          if ls artifacts/printdriver/*.exe artifacts/printdriver/*.json 1> /dev/null 2>&1; then
            cp artifacts/printdriver/PrintDriver.exe static/
            cp artifacts/printdriver/Setup.exe static/
            cp artifacts/printdriver/printdriver.json static/

            VERSION=$(grep -oP '"version":\s*"\K[^"]+' artifacts/printdriver/printdriver.json)
            cp artifacts/printdriver/PrintDriver.exe "static/PrintDriver-${VERSION}.exe"
            cp artifacts/printdriver/Setup.exe "static/Setup-${VERSION}.exe"
          fi

          # QuickWIN app
          if [ -d "artifacts/printdriver-quickwin/dist" ]; then
            cp -r artifacts/printdriver-quickwin/dist static/printdriver/
          fi

      - name: Create ZIP archive
        run: |
          cd static && zip -r ../static.zip .

      - name: Upload to server
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
        run: |
          for i in $(seq 1 10); do
            echo "Upload attempt $i/10..."
            if curl -X POST \
              -H "token: $UPLOAD_TOKEN" \
              -H "Content-Type: application/zip" \
              --data-binary "@static.zip" \
              --max-time 60 \
              --fail \
              "$UPLOAD_URL"; then
              echo "Upload succeeded on attempt $i"
              exit 0
            fi
            echo "Upload failed or timed out on attempt $i, retrying in 5s..."
            sleep 5
          done
          echo "Upload failed after 10 attempts"
          exit 1

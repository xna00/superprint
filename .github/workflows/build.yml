name: Build and Upload PrintDriver

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: printdriver/vcpkg.json
          doNotCache: false
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows-static

      - name: Install Inno Setup
        run: |
            choco install innosetup --version 5.6.1 -y --allow-downgrade

      - name: Verify Inno Setup
        run: |
          $cmd = Get-Command iscc -ErrorAction SilentlyContinue
          if ($null -eq $cmd) {
            Write-Error "iscc not found in PATH. PATH=$env:Path"
            exit 1
          } else {
            Write-Host "iscc found: $($cmd.Source)"
          }

      - name: Configure CMake
        run: |
          cd printdriver
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static
          cmake --build build --config Release

      - name: Build Installer
        run: |
          cd printdriver
          mkdir output -Force
          copy build\Release\PrintDriver.exe build\PrintDriver.exe
          copy build\Release\PrintDriver.exe output\PrintDriver.exe
          iscc installer\PrintDriver.iss

      - name: Sign executables
        run: |
          $pfxPath = "printdriver\cert\PrintDriver.pfx"
          if (Test-Path $pfxPath) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1
            
            Write-Host "Signing PrintDriver.exe..."
            & $signtool.FullName sign /f $pfxPath /p "PrintDriver2024" /fd sha256 "printdriver\output\PrintDriver.exe"
            
            Write-Host "Signing PrintDriver-Setup.exe..."
            & $signtool.FullName sign /f $pfxPath /p "PrintDriver2024" /fd sha256 "printdriver\output\PrintDriver-Setup.exe"
          } else {
            Write-Host "Certificate not found, skipping signing"
          }

      - name: Generate version info
        shell: pwsh
        run: |
          cd printdriver
          $versionLine = Select-String -Path "CMakeLists.txt" -Pattern 'VERSION\s+(\d+\.\d+\.\d+)' | Select-Object -First 1
          if ($versionLine) {
            $version = $versionLine.Matches.Groups[1].Value
            $json = @{
              version = $version
              exe = 'PrintDriver.exe'
              setupexe = 'PrintDriver-Setup.exe'
            } | ConvertTo-Json -Depth 3
            [System.IO.File]::WriteAllText("$PWD\output\printdriver.json", $json, [System.Text.UTF8Encoding]::new($false))
            Write-Host "Generated printdriver.json with version $version"
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Server Types
        run: |
          cd server
          npm ci
          npm run buildtype

      - name: Build Web
        run: |
          cd web
          npm ci
          npm run build

      - name: Prepare static files
        run: |
          mkdir static -Force
          Copy-Item -Path web\dist\* -Destination static -Recurse -Force
          Copy-Item -Path printdriver\output\PrintDriver.exe -Destination static -Force
          Copy-Item -Path printdriver\output\PrintDriver-Setup.exe -Destination static -Force
          Copy-Item -Path printdriver\output\printdriver.json -Destination static -Force

      - name: Create ZIP archive
        run: |
          if (Test-Path static.zip) { Remove-Item static.zip -Force }
          Compress-Archive -Path static\* -DestinationPath static.zip -CompressionLevel Optimal

      - name: Upload to server
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
        run: |
          $headers = @{
            'token' = $env:UPLOAD_TOKEN
            'Content-Type' = 'application/zip'
          }
          try {
            $response = Invoke-WebRequest -Uri $env:UPLOAD_URL -Method POST -Headers $headers -InFile 'static.zip' -ErrorAction Stop
            Write-Host "Upload successful: $($response.Content)"
          } catch {
            Write-Host "Upload failed: $($_.Exception.Message)"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PrintDriver
          path: |
            printdriver/output/PrintDriver.exe
            printdriver/output/PrintDriver-Setup.exe
            printdriver/output/printdriver.json

name: Build and Upload

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  NODE_VERSION: '24'

jobs:
  build-printdriver:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - name: Cache innosetup
        id: cache-innosetup
        uses: actions/cache@v5
        with:
          path: C:\Program Files (x86)\Inno Setup 5
          key: ${{ runner.os }}-innosetup-5.6.1

      - name: Install Inno Setup
        if: steps.cache-innosetup.outputs.cache-hit != 'true'
        run: |
          choco install innosetup --version 5.6.1 -y --allow-downgrade

      - name: Cache CMake build
        id: cache-cmake
        uses: actions/cache@v5
        with:
          path: printdriver/build
          key: ${{ runner.os }}-cmake-build-${{ hashFiles('printdriver/src/**', 'printdriver/CMakeLists.txt', 'printdriver/vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-cmake-build-

      - name: Cache vcpkg
        id: cache-vcpkg
        uses: actions/cache@v5
        with:
          path: |
            vcpkg
            printdriver/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-x64-windows-static-${{ hashFiles('printdriver/vcpkg.json') }}

      - name: Cache printdriver output
        id: cache-printdriver
        uses: actions/cache@v5
        with:
          path: printdriver/output
          key: ${{ runner.os }}-printdriver-output-${{ hashFiles('printdriver/src/**', 'printdriver/CMakeLists.txt', 'printdriver/vcpkg.json', 'printdriver/cert/**', 'printdriver/installer/**') }}

      - name: Setup vcpkg
        if: steps.cache-printdriver.outputs.cache-hit != 'true' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: printdriver/vcpkg.json
          doNotCache: false
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows-static

      - name: Install vcpkg manifest deps (explicit)
        if: steps.cache-printdriver.outputs.cache-hit != 'true' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          & (Join-Path $env:VCPKG_ROOT 'vcpkg.exe') install --triplet x64-windows-static

      - name: Configure and Build CMake
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="../vcpkg/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static -DVCPKG_MANIFEST_INSTALL=OFF -DVCPKG_INSTALLED_DIR="$PWD\vcpkg_installed"
          cmake --build build --config Release

      - name: Create Chinese language file
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          $langDir = "C:\Program Files (x86)\Inno Setup 5\Languages"
          New-Item -ItemType Directory -Force -Path $langDir | Out-Null
          $content = "; Inno Setup Chinese Simplified`n`n[LangOptions]`nLanguageName=<7B80><4F53><4E2D><6587>`nLanguageID=`$0804`nLanguageCodePage=0`n`n[Messages]`nSetupAppTitle=<5B89><88C5>`nSetupWindowTitle=<5B89><88C5> - %1`nUninstallAppTitle=<5378><8F7D>`nButtonNext=<4E0B><4E00><6B65>`nButtonInstall=<5B89><88C5>`nButtonOK=<786E><5B9A>`nButtonCancel=<53D6><6D88>`nButtonYes=<662F>`nButtonNo=<5426>`nButtonFinish=<5B8C><6210>`nWizardLicense=<8BB8><53EF><534F><8BAE>`nLicenseLabel=<8BF7><5728><7EE7><7EED><5B89><88C5><524D><9605><8BFB><4EE5><4E0B><91CD><8981><4FE1><606F>`nLicenseAccepted=<6211><540C><610F><6B64><534F><8BAE>`nLicenseNotAccepted=<6211><4E0D><540C><610F><6B64><534F><8BAE>`nWizardSelectDir=<9009><62E9><76EE><6807><4F4D><7F6E>`nSelectDirDesc=<60A8><60F3><5C06> [name] <5B89><88C5><5728><54EA><91CC>`nDirExistsTitle=<6587><4EF6><5939><5DF2><5B58><5728>`nDirExists=<6587><4EF6><5939><5DF2><5B58><5728>`nWizardReady=<51C6><5907><5B89><88C5>`nReadyLabel1=<5B89><88C5><7A0B><5E8F><51C6><5907><5C31><7EE7>`nReadyLabel2a=<70B9><51FB><5B89><88C5><7EE7><7EED>`nWizardInstalling=<6B63><5728><5B89><88C5>`nInstallingLabel=<6B63><5728><5B89><88C5>`nFinishedHeadingLabel=<5B89><88C5><5B8C><6210>`nFinishedLabel=<5B89><88C5><5B8C><6210>`nClickFinish=<70B9><51FB><5B8C><6210>`nWizardUninstalling=<5378><8F7D>`nConfirmUninstall=<786E><8BA4><79FB><9664> %1`nUninstallStatusLabel=<6B63><5728><79FB><9664>`nUninstalledAll=<5DF2><987A><5229><79FB><9664>`n`n[CustomMessages]`nCreateDesktopIcon=<521B><5EFA><684C><9762><5FEB><6377><65B9><5F0F>"
          $bom = [byte[]](0xEF, 0xBB, 0xBF)
          $bytes = $bom + [System.Text.Encoding]::UTF8.GetBytes($content)
          [System.IO.File]::WriteAllBytes("$langDir\ChineseSimplified.isl", $bytes)

      - name: Build Installer
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          mkdir output -Force
          copy build\Release\PrintDriver.exe build\PrintDriver.exe
          copy build\Release\PrintDriver.exe output\PrintDriver.exe
          & (Join-Path 'C:\Program Files (x86)' 'Inno Setup 5\ISCC.exe') installer\PrintDriver.iss

      - name: Sign executables
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          $pfxPath = "printdriver\cert\PrintDriver.pfx"
          if (Test-Path $pfxPath) {
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" | Select-Object -Last 1
            
            Write-Host "Signing PrintDriver.exe..."
            & $signtool.FullName sign /f $pfxPath /p "PrintDriver2024" /fd sha256 "printdriver\output\PrintDriver.exe"
            
            Write-Host "Signing SuperPrint-Setup.exe..."
            & $signtool.FullName sign /f $pfxPath /p "PrintDriver2024" /fd sha256 "printdriver\output\SuperPrint-Setup.exe"
          } else {
            Write-Host "Certificate not found, skipping signing"
          }

      - name: Generate version info
        if: steps.cache-printdriver.outputs.cache-hit != 'true'
        run: |
          cd printdriver
          $versionLine = Select-String -Path "CMakeLists.txt" -Pattern 'VERSION\s+(\d+\.\d+\.\d+)' | Select-Object -First 1
          if ($versionLine) {
            $version = $versionLine.Matches.Groups[1].Value
            $json = @{
              version = $version
              exe = 'PrintDriver.exe'
              setupexe = 'SuperPrint-Setup.exe'
            } | ConvertTo-Json -Depth 3
            [System.IO.File]::WriteAllText("$PWD\output\printdriver.json", $json, [System.Text.UTF8Encoding]::new($false))
            Write-Host "Generated printdriver.json with version $version"
          }

      - name: Upload printdriver artifacts
        uses: actions/upload-artifact@v6
        with:
          name: PrintDriver
          path: |
            printdriver/output/PrintDriver.exe
            printdriver/output/SuperPrint-Setup.exe
            printdriver/output/printdriver.json

  build-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache server build
        id: cache-server
        uses: actions/cache@v5
        with:
          path: server/dist
          key: ${{ runner.os }}-server-dist-${{ hashFiles('server/**/*.ts') }}

      - name: Build Server
        if: steps.cache-server.outputs.cache-hit != 'true'
        run: |
          cd server
          npm ci
          npm run buildtype

      - name: Upload server artifacts
        uses: actions/upload-artifact@v6
        with:
          name: server-artifacts
          path: server/dist
          retention-days: 1

  build-web:
    needs: build-server
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Download server artifacts
        uses: actions/download-artifact@v8
        with:
          name: server-artifacts
          path: server/dist
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache web build
        id: cache-web
        uses: actions/cache@v5
        with:
          path: web/dist
          key: ${{ runner.os }}-web-dist-${{ hashFiles('web/**') }}-${{ hashFiles('server/**/*.ts') }}

      - name: Build Web
        if: steps.cache-web.outputs.cache-hit != 'true'
        run: |
          cd web
          npm ci
          npm run build

      - name: Upload web artifacts
        uses: actions/upload-artifact@v6
        with:
          name: web-artifacts
          path: web/dist
          retention-days: 1

  assemble:
    needs: [build-printdriver, build-server, build-web]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Download printdriver artifacts
        uses: actions/download-artifact@v8
        with:
          name: PrintDriver
          path: printdriver/output
          merge-multiple: true

      - name: Download server artifacts
        uses: actions/download-artifact@v8
        with:
          name: server-artifacts
          path: server/dist
          merge-multiple: true

      - name: Download web artifacts
        uses: actions/download-artifact@v8
        with:
          name: web-artifacts
          path: web/dist
          merge-multiple: true

      - name: Prepare static files
        run: |
          mkdir -p static
          if [ -d "web/dist" ] && [ "$(ls -A web/dist 2>/dev/null)" ]; then
            cp -r web/dist/* static/
          fi
          if [ -d "printdriver/output" ] && ls printdriver/output/*.exe printdriver/output/*.json 1> /dev/null 2>&1; then
            cp printdriver/output/PrintDriver.exe static/
            cp printdriver/output/SuperPrint-Setup.exe static/
            cp printdriver/output/printdriver.json static/
            
            VERSION=$(grep -oP '"version":\s*"\K[^"]+' printdriver/output/printdriver.json)
            cp printdriver/output/PrintDriver.exe "static/PrintDriver-${VERSION}.exe"
            cp printdriver/output/SuperPrint-Setup.exe "static/SuperPrint-Setup-${VERSION}.exe"
          fi

      - name: Create ZIP archive
        run: |
          cd static && zip -r ../static.zip .

      - name: Upload to server
        env:
          UPLOAD_TOKEN: ${{ secrets.UPLOAD_TOKEN }}
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
        run: |
          curl -X POST \
            -H "token: $UPLOAD_TOKEN" \
            -H "Content-Type: application/zip" \
            --data-binary "@static.zip" \
            "$UPLOAD_URL"
